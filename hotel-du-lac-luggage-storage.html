<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luggage Log · Hotel du Lac</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:#2B2720; --cream:#F5F1EA; --sand:#E8E0D0; --mid:#7A6D5F; --light:#BDB5AC;
      --white:#FFFFFF; --green:#4A6741; --green-lt:#EBF0E8; --green-dk:#3A5232;
      --amber:#A0692A; --amber-lt:#FDF3E7; --red:#8B2A20; --blue:#2A5F8F; --blue-lt:#E8F0F8;
    }
    body { background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; font-weight:300; min-height:100vh; -webkit-font-smoothing:antialiased; }
    header { background:var(--ink); padding:0.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .header-brand { font-family:'EB Garamond',serif; font-size:1.1rem; color:var(--white); }
    .header-brand span { color:#9DB896; }
    .header-right { display:flex; align-items:center; gap:1rem; }
    .date-pill { font-size:0.8rem; color:#9DB896; font-family:'EB Garamond',serif; }
    .manager-btn { font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; color:#9DB896; background:none; border:1px solid #3D3830; border-radius:2px; padding:0.3rem 0.7rem; cursor:pointer; font-family:'Jost',sans-serif; }
    .manager-btn:hover { border-color:#9DB896; }
    .tab-nav { background:var(--white); border-bottom:1px solid var(--sand); display:flex; padding:0 1.5rem; overflow-x:auto; }
    .tab { padding:0.85rem 1rem; font-size:0.76rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--light); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; font-family:'Jost',sans-serif; white-space:nowrap; transition:color 0.15s,border-color 0.15s; }
    .tab.active { color:var(--green); border-bottom-color:var(--green); }
    main { padding:1.25rem; max-width:700px; margin:0 auto; }
    .view { display:none; }
    .view.active { display:block; }
    .card { background:var(--white); border:1px solid var(--sand); border-radius:6px; padding:1.4rem; margin-bottom:1.25rem; }
    .card-title { font-family:'EB Garamond',serif; font-size:1.25rem; font-weight:400; margin-bottom:1.2rem; padding-bottom:0.75rem; border-bottom:1px solid var(--sand); display:flex; justify-content:space-between; align-items:baseline; }
    .card-title-date { font-size:0.78rem; color:var(--light); font-family:'Jost',sans-serif; font-weight:300; }
    .field { display:flex; flex-direction:column; gap:0.3rem; margin-bottom:1rem; }
    label { font-size:0.68rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--mid); }
    select,input[type="text"],input[type="number"],input[type="date"] { background:var(--cream); border:1px solid var(--sand); border-radius:3px; padding:0.65rem 0.8rem; font-family:'Jost',sans-serif; font-size:0.9rem; font-weight:300; color:var(--ink); width:100%; outline:none; -webkit-appearance:none; transition:border-color 0.15s; }
    select:focus,input:focus { border-color:var(--green); background:var(--white); }
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type="number"] { -moz-appearance:textfield; }
    .receipt-display { background:var(--ink); color:var(--white); border-radius:4px; padding:0.9rem 1rem; display:flex; align-items:center; justify-content:space-between; }
    .receipt-display .r-label { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:#6E665E; }
    .receipt-display .r-num { font-family:'EB Garamond',serif; font-size:2rem; color:#9DB896; line-height:1; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
    .counter-label { font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--light); margin-bottom:0.35rem; }
    .counter-row { display:flex; align-items:center; border:1px solid var(--sand); border-radius:4px; overflow:hidden; background:var(--white); }
    .counter-btn { width:48px; height:48px; background:var(--sand); border:none; font-size:1.4rem; cursor:pointer; color:var(--ink); font-family:'Jost',sans-serif; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
    .counter-btn:hover { background:#D0C8B8; }
    .counter-val { flex:1; text-align:center; font-family:'EB Garamond',serif; font-size:1.8rem; color:var(--ink); border:none; background:transparent; outline:none; width:100%; }
    .photo-section { margin-bottom:1rem; }
    .photo-section label { display:block; margin-bottom:0.5rem; }
    .photo-actions { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:0.6rem; }
    .photo-btn { padding:0.65rem; border:1px solid var(--sand); border-radius:3px; background:var(--cream); font-family:'Jost',sans-serif; font-size:0.82rem; color:var(--mid); cursor:pointer; text-align:center; }
    .photo-btn.primary { background:var(--ink); color:var(--white); border-color:var(--ink); }
    video#camView { width:100%; border-radius:4px; display:none; background:#000; margin-bottom:0.5rem; max-height:240px; object-fit:cover; }
    .cam-controls { display:none; gap:0.5rem; margin-bottom:0.6rem; }
    .cam-snap { flex:2; padding:0.6rem; background:var(--green); color:var(--white); border:none; border-radius:3px; font-family:'Jost',sans-serif; font-size:0.82rem; cursor:pointer; }
    .cam-stop { flex:1; padding:0.6rem; background:var(--sand); color:var(--ink); border:none; border-radius:3px; font-family:'Jost',sans-serif; font-size:0.82rem; cursor:pointer; }
    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(72px,1fr)); gap:0.4rem; }
    .photo-thumb { position:relative; aspect-ratio:1; border-radius:3px; overflow:hidden; border:1px solid var(--sand); }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; }
    .photo-thumb .rm { position:absolute; top:2px; right:2px; background:rgba(43,39,32,0.75); color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    input[type="file"].hidden { display:none; }
    .paid-wrap { position:relative; margin-top:1rem; margin-bottom:0; }
    .paid-wrap .chf { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); font-family:'EB Garamond',serif; font-size:1.1rem; color:var(--mid); pointer-events:none; }
    .paid-wrap input { padding-left:3.2rem; font-family:'EB Garamond',serif; font-size:1.4rem; font-weight:400; }
    .checkin-btn { width:100%; background:var(--green); color:var(--white); border:none; padding:1rem; font-family:'Jost',sans-serif; font-size:0.9rem; font-weight:500; letter-spacing:0.09em; text-transform:uppercase; border-radius:4px; cursor:pointer; margin-top:1.2rem; transition:opacity 0.2s; }
    .checkin-btn:hover { opacity:0.88; }
    .checkin-btn:disabled { opacity:0.5; cursor:not-allowed; }
    /* ACTIVE LIST */
    .list-header { display:flex; align-items:center; gap:0.6rem; margin-bottom:1rem; }
    .list-title { font-family:'EB Garamond',serif; font-size:1.3rem; font-weight:400; }
    .count-badge { background:var(--green); color:var(--white); font-size:0.7rem; font-weight:600; padding:0.2rem 0.55rem; border-radius:10px; }
    .amber-badge { background:var(--amber-lt); color:var(--amber); font-size:0.7rem; font-weight:600; padding:0.2rem 0.55rem; border-radius:10px; }
    .luggage-row { background:var(--white); border:1px solid var(--sand); border-radius:6px; padding:0.9rem 1rem; margin-bottom:0.6rem; display:grid; grid-template-columns:56px 1fr auto; gap:0.6rem 1rem; align-items:center; }
    .luggage-row.overnight { border-left:3px solid var(--amber); }
    .row-receipt { font-family:'EB Garamond',serif; font-size:1.5rem; color:var(--light); text-align:center; line-height:1; }
    .row-meta { font-size:0.78rem; color:var(--mid); display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; margin-top:0.15rem; }
    .row-photos { display:flex; gap:0.25rem; margin-top:0.4rem; flex-wrap:wrap; }
    .row-photos img { width:38px; height:38px; object-fit:cover; border-radius:2px; border:1px solid var(--sand); cursor:pointer; }
    .checkout-btn { background:var(--ink); color:var(--white); border:none; padding:0.5rem 0.9rem; font-family:'Jost',sans-serif; font-size:0.72rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; border-radius:3px; cursor:pointer; white-space:nowrap; }
    .checkout-btn:hover { background:var(--green-dk); }
    .overnight-tag { font-size:0.65rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; background:var(--amber-lt); color:var(--amber); padding:0.1rem 0.4rem; border-radius:2px; }
    .res-tag { font-size:0.65rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; background:var(--blue-lt); color:var(--blue); padding:0.1rem 0.4rem; border-radius:2px; }
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--light); }
    /* RESERVATIONS */
    .res-row { background:var(--white); border:1px solid var(--sand); border-radius:6px; padding:0.9rem 1rem; margin-bottom:0.6rem; display:grid; grid-template-columns:1fr auto; gap:0.6rem 1rem; align-items:center; }
    .res-row.today { border-left:3px solid var(--green); }
    .res-num { font-family:'EB Garamond',serif; font-size:1rem; font-weight:500; color:var(--green-dk); }
    .res-meta { font-size:0.8rem; color:var(--mid); margin-top:0.15rem; display:flex; gap:0.6rem; flex-wrap:wrap; }
    .checkin-from-res-btn { background:var(--green); color:var(--white); border:none; padding:0.45rem 0.8rem; font-family:'Jost',sans-serif; font-size:0.7rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; border-radius:3px; cursor:pointer; white-space:nowrap; }
    /* MANAGER */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:0.8rem; margin-bottom:1.25rem; }
    .stat-card { background:var(--white); border:1px solid var(--sand); border-radius:6px; padding:1rem; }
    .stat-label { font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--mid); margin-bottom:0.3rem; }
    .stat-value { font-family:'EB Garamond',serif; font-size:1.9rem; color:var(--ink); line-height:1; }
    .stat-sub { font-size:0.72rem; color:var(--light); margin-top:0.25rem; }
    .history-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .history-table th { text-align:left; font-size:0.66rem; letter-spacing:0.09em; text-transform:uppercase; color:var(--mid); font-weight:500; padding:0.5rem 0.7rem; border-bottom:2px solid var(--sand); }
    .history-table td { padding:0.65rem 0.7rem; border-bottom:1px solid var(--sand); vertical-align:middle; }
    .history-table tr:last-child td { border-bottom:none; }
    .history-table tr:hover td { background:var(--cream); }
    .s-in { color:var(--green); font-size:0.7rem; font-weight:600; text-transform:uppercase; }
    .s-out { color:var(--light); font-size:0.7rem; text-transform:uppercase; }
    /* LOCK */
    .lock-screen { position:fixed; inset:0; background:var(--ink); display:flex; align-items:center; justify-content:center; z-index:1000; flex-direction:column; gap:1.2rem; padding:2rem; }
    .lock-screen h2 { font-family:'EB Garamond',serif; font-size:1.5rem; color:var(--white); font-weight:400; }
    .lock-input { background:rgba(255,255,255,0.07); border:1px solid #3D3830; border-radius:3px; padding:0.75rem 1rem; font-family:'Jost',sans-serif; font-size:1rem; color:var(--white); width:100%; max-width:260px; outline:none; text-align:center; letter-spacing:0.18em; }
    .lock-input:focus { border-color:#9DB896; }
    .lock-btn { background:var(--green); color:var(--white); border:none; padding:0.75rem 2rem; font-family:'Jost',sans-serif; font-size:0.85rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; border-radius:3px; cursor:pointer; width:100%; max-width:260px; }
    .lock-error { color:#E88A80; font-size:0.8rem; min-height:1.1em; }
    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(43,39,32,0.75); z-index:500; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .modal { background:var(--white); border-radius:8px; padding:1.6rem; width:100%; max-width:380px; }
    .modal h3 { font-family:'EB Garamond',serif; font-size:1.3rem; font-weight:400; margin-bottom:0.4rem; }
    .modal-detail { font-size:0.85rem; color:var(--mid); margin-bottom:1rem; line-height:1.6; }
    .modal-photos { display:flex; gap:0.35rem; flex-wrap:wrap; margin-bottom:1rem; }
    .modal-photos img { width:56px; height:56px; object-fit:cover; border-radius:3px; border:2px solid var(--sand); cursor:pointer; }
    .modal-actions { display:flex; gap:0.7rem; }
    .modal-confirm { flex:2; background:var(--green); color:var(--white); border:none; padding:0.8rem; font-family:'Jost',sans-serif; font-size:0.82rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; border-radius:3px; cursor:pointer; }
    .modal-cancel { flex:1; background:var(--cream); color:var(--mid); border:1px solid var(--sand); padding:0.8rem; font-family:'Jost',sans-serif; font-size:0.82rem; border-radius:3px; cursor:pointer; }
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:900; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .lightbox img { max-width:92vw; max-height:88vh; border-radius:4px; object-fit:contain; }
    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:var(--white); padding:0.65rem 1.3rem; border-radius:4px; font-size:0.85rem; transition:transform 0.28s ease; z-index:999; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.green { background:var(--green-dk); }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:420px) { .luggage-row { grid-template-columns:44px 1fr; } .checkout-btn { grid-column:1/-1; width:100%; } }
  </style>
</head>
<body>

<div class="lock-screen" id="lockScreen" style="display:none;">
  <h2>Manager Access</h2>
  <input class="lock-input" type="password" id="lockInput" placeholder="••••••" onkeydown="if(event.key==='Enter')tryUnlock()"/>
  <div class="lock-error" id="lockError"></div>
  <button class="lock-btn" onclick="tryUnlock()">Unlock</button>
  <button onclick="hideLock()" style="background:none;border:none;color:#6E665E;font-family:'Jost',sans-serif;font-size:0.78rem;cursor:pointer;">← Back</button>
</div>

<div class="modal-overlay" id="checkoutModal" style="display:none;">
  <div class="modal">
    <h3>Check out bags?</h3>
    <div class="modal-detail" id="modalDetail"></div>
    <div class="modal-photos" id="modalPhotos"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmCheckout()">Confirm checkout</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" style="display:none;" onclick="this.style.display='none'">
  <img id="lightboxImg" src="" alt=""/>
</div>
<div class="toast" id="toast"></div>

<header>
  <div class="header-brand">Hotel du Lac <span>· Luggage</span></div>
  <div class="header-right">
    <span class="date-pill" id="datePill"></span>
    <button class="manager-btn" onclick="showLock()">Manager ↗</button>
  </div>
</header>

<div class="tab-nav">
  <button class="tab active" onclick="switchTab('checkin',this)">Check In</button>
  <button class="tab" onclick="switchTab('reservations',this)">Reservations <span id="resTabCount"></span></button>
  <button class="tab" onclick="switchTab('active',this)">Active <span id="tabCount"></span></button>
  <button class="tab" id="managerTab" style="display:none;" onclick="switchTab('manager',this)">Manager</button>
</div>

<main>

  <!-- CHECK IN -->
  <div class="view active" id="view-checkin">
    <div class="card">
      <div class="card-title">New check-in <span class="card-title-date" id="cardDate"></span></div>

      <div class="field">
        <label>Receipt number</label>
        <div class="receipt-display">
          <div><div class="r-label">Auto-assigned</div><div class="r-num" id="receiptDisplay">—</div></div>
          <svg width="24" height="24" fill="none" stroke="#3D3830" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
      </div>

      <div class="field">
        <label>Number of bags</label>
        <div class="two-col">
          <div><div class="counter-label">Large bags</div><div class="counter-row"><button class="counter-btn" onclick="adjustCount('largeBags',-1)">−</button><input class="counter-val" type="number" id="largeBags" value="0" min="0" readonly/><button class="counter-btn" onclick="adjustCount('largeBags',1)">+</button></div></div>
          <div><div class="counter-label">Small bags</div><div class="counter-row"><button class="counter-btn" onclick="adjustCount('smallBags',-1)">−</button><input class="counter-val" type="number" id="smallBags" value="0" min="0" readonly/><button class="counter-btn" onclick="adjustCount('smallBags',1)">+</button></div></div>
        </div>
      </div>

      <div class="field">
        <label>Overnight storage?</label>
        <select id="overnight"><option value="no">No — same day collection</option><option value="yes">Yes — overnight (+CHF 10)</option></select>
      </div>

      <div class="photo-section">
        <label>Photos of bags</label>
        <video id="camView" autoplay playsinline></video>
        <div class="cam-controls" id="camControls">
          <button class="cam-snap" onclick="snapPhoto()">📸 Capture</button>
          <button class="cam-stop" onclick="stopCamera()">✕ Stop</button>
        </div>
        <div class="photo-actions">
          <button class="photo-btn primary" onclick="startCamera()">📷 Camera</button>
          <button class="photo-btn" onclick="document.getElementById('fileIn').click()">📁 Upload</button>
        </div>
        <input type="file" accept="image/*" multiple class="hidden" id="fileIn" onchange="handleUpload(event)"/>
        <div class="photo-grid" id="photoGrid"></div>
      </div>

      <div class="field paid-wrap">
        <label>Total paid (CHF)</label>
        <span class="chf">CHF</span>
        <input type="number" id="totalPaid" min="0" step="1" placeholder="0"/>
      </div>

      <button class="checkin-btn" id="checkinBtn" onclick="doCheckIn()">Check in bags</button>
    </div>
  </div>

  <!-- RESERVATIONS -->
  <div class="view" id="view-reservations">
    <div class="list-header">
      <div class="list-title">Upcoming reservations</div>
      <div class="count-badge" id="resCount">0</div>
    </div>
    <div id="resList"><div class="empty-state"><p>Loading…</p></div></div>
  </div>

  <!-- ACTIVE -->
  <div class="view" id="view-active">
    <div class="list-header">
      <div class="list-title">In storage</div>
      <div class="count-badge" id="activeCount">0</div>
    </div>
    <div id="activeList"><div class="empty-state"><p>Loading…</p></div></div>
  </div>

  <!-- MANAGER -->
  <div class="view" id="view-manager">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card">
      <div class="card-title">All records</div>
      <div style="overflow-x:auto;">
        <table class="history-table">
          <thead><tr><th>Receipt</th><th>Bags</th><th>Date</th><th>O/N</th><th>Paid</th><th>Photos</th><th>Status</th><th>Out</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:0.7rem;flex-wrap:wrap;">
      <button onclick="exportCSV()" style="background:var(--ink);color:var(--white);border:none;padding:0.55rem 1.1rem;font-family:'Jost',sans-serif;font-size:0.76rem;letter-spacing:0.07em;text-transform:uppercase;border-radius:3px;cursor:pointer;">Export CSV</button>
    </div>
  </div>

</main>

<script>
  const SUPABASE_URL = 'https://dcwgfehxsvkngqhalbxp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjd2dmZWh4c3ZrbmdxaGFsYnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTg2MDgsImV4cCI6MjA5OTczNDYwOH0.NAd1wis_L8L97pDD3NaHVrmwTYQRiRWROK2LbQMkXO4';
  const MANAGER_PW = 'dulac2026';

  let photos = [];
  let camStream = null;
  let checkoutId = null;
  let managerUnlocked = false;

  // ── SUPABASE HELPERS ──
  async function sb(table, method='GET', body=null, filter='') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`, {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'return=representation' : ''
      },
      body: body ? JSON.stringify(body) : null
    });
    if (!res.ok) { const e = await res.text(); throw new Error(e); }
    if (method === 'DELETE' || res.status === 204) return null;
    return res.json();
  }

  // ── INIT ──
  function init() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    document.getElementById('datePill').textContent = dateStr;
    document.getElementById('cardDate').textContent = dateStr;
    loadNextReceipt();
  }

  async function loadNextReceipt() {
    try {
      const rows = await sb('luggage_log','GET',null,'?select=receipt&order=id.desc&limit=1');
      const last = rows && rows.length ? parseInt(rows[0].receipt) || 0 : 0;
      document.getElementById('receiptDisplay').textContent = '#' + String(last + 1).padStart(4,'0');
    } catch(e) { document.getElementById('receiptDisplay').textContent = '#0001'; }
  }

  async function nextReceipt() {
    const rows = await sb('luggage_log','GET',null,'?select=receipt&order=id.desc&limit=1');
    const last = rows && rows.length ? parseInt(rows[0].receipt) || 0 : 0;
    return String(last + 1).padStart(4,'0');
  }

  // ── COUNTERS ──
  function adjustCount(id, d) {
    const el = document.getElementById(id);
    el.value = Math.max(0, parseInt(el.value) + d);
  }

  // ── CAMERA ──
  async function startCamera() {
    try {
      camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      const v = document.getElementById('camView');
      v.srcObject = camStream; v.style.display = 'block';
      document.getElementById('camControls').style.display = 'flex';
    } catch(e) { showToast('Camera unavailable — use upload instead'); }
  }
  function snapPhoto() {
    const v = document.getElementById('camView');
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    photos.push(c.toDataURL('image/jpeg',0.75));
    renderPhotoGrid(); showToast('Photo captured','green');
  }
  function stopCamera() {
    if (camStream) { camStream.getTracks().forEach(t=>t.stop()); camStream = null; }
    document.getElementById('camView').style.display = 'none';
    document.getElementById('camControls').style.display = 'none';
  }
  function handleUpload(e) {
    Array.from(e.target.files).forEach(f => {
      const r = new FileReader();
      r.onload = ev => { photos.push(ev.target.result); renderPhotoGrid(); };
      r.readAsDataURL(f);
    });
    e.target.value = '';
  }
  function renderPhotoGrid() {
    document.getElementById('photoGrid').innerHTML = photos.map((src,i) =>
      `<div class="photo-thumb"><img src="${src}" onclick="lightbox('${src}')"/><button class="rm" onclick="photos.splice(${i},1);renderPhotoGrid()">×</button></div>`
    ).join('');
  }

  // ── CHECK IN ──
  async function doCheckIn() {
    const large = parseInt(document.getElementById('largeBags').value) || 0;
    const small = parseInt(document.getElementById('smallBags').value) || 0;
    if (large + small === 0) { showToast('Please add at least one bag'); return; }
    const btn = document.getElementById('checkinBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving…';
    try {
      const receipt = await nextReceipt();
      const overnight = document.getElementById('overnight').value === 'yes';
      const paid = parseFloat(document.getElementById('totalPaid').value) || 0;
      const drop_date = new Date().toISOString().slice(0,10);
      await sb('luggage_log','POST',{
        receipt, large_bags:large, small_bags:small, overnight, drop_date,
        paid, photos, status:'in'
      });
      photos = []; renderPhotoGrid();
      document.getElementById('largeBags').value = 0;
      document.getElementById('smallBags').value = 0;
      document.getElementById('totalPaid').value = '';
      document.getElementById('overnight').value = 'no';
      stopCamera();
      await loadNextReceipt();
      showToast(`✓ Checked in · #${receipt} · ${large+small} bag${large+small>1?'s':''}`, 'green');
      updateTabCount();
    } catch(e) { showToast('Error saving — check connection'); console.error(e); }
    btn.disabled = false;
    btn.innerHTML = 'Check in bags';
  }

  // ── RESERVATIONS ──
  async function renderReservations() {
    const el = document.getElementById('resList');
    el.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
    try {
      const today = new Date().toISOString().slice(0,10);
      const rows = await sb('reservations','GET',null,`?status=eq.pending&drop_date=gte.${today}&order=drop_date.asc`);
      document.getElementById('resCount').textContent = rows.length;
      document.getElementById('resTabCount').textContent = rows.length ? `(${rows.length})` : '';
      if (!rows.length) { el.innerHTML='<div class="empty-state"><p>No upcoming reservations.</p></div>'; return; }
      el.innerHTML = rows.map(r => {
        const isToday = r.drop_date === today;
        return `<div class="res-row ${isToday?'today':''}">
          <div>
            <div class="res-num">${r.reservation_number} ${isToday?'<span class="count-badge" style="font-size:0.6rem;">TODAY</span>':''}</div>
            <div style="font-weight:500;font-size:0.92rem;margin:0.15rem 0;">${r.name}</div>
            <div class="res-meta">
              <span>${r.large_bags||0} large · ${r.small_bags||0} small</span>
              <span>Drop-off: ${r.drop_date}</span>
            </div>
          </div>
          <button class="checkin-from-res-btn" onclick="checkInFromRes(${r.id},'${r.reservation_number}',${r.large_bags||0},${r.small_bags||0})">Check in</button>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML='<div class="empty-state"><p>Could not load reservations.</p></div>'; }
  }

  async function checkInFromRes(resId, resNum, large, small) {
    // Pre-fill check-in form with reservation details and switch to check-in tab
    document.getElementById('largeBags').value = large;
    document.getElementById('smallBags').value = small;
    // Switch to check-in tab
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.tab').classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-checkin').classList.add('active');
    showToast(`Reservation ${resNum} loaded — add photos & confirm`,'green');
    // Mark reservation as checked-in after a moment
    setTimeout(async () => {
      try { await sb('reservations','PATCH',{status:'checked_in'},`?id=eq.${resId}`); } catch(e) {}
    }, 500);
  }

  // ── ACTIVE LIST ──
  async function renderActive() {
    const el = document.getElementById('activeList');
    try {
      const rows = await sb('luggage_log','GET',null,'?status=eq.in&order=id.desc');
      document.getElementById('activeCount').textContent = rows.length;
      if (!rows.length) { el.innerHTML='<div class="empty-state"><p>No bags in storage right now.</p></div>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="luggage-row ${r.overnight?'overnight':''}">
          <div class="row-receipt">#${r.receipt}</div>
          <div class="row-body">
            <div style="font-weight:500;font-size:0.95rem;">${(r.large_bags||0)+(r.small_bags||0)} bags <span style="font-size:0.78rem;font-weight:300;color:var(--mid);">(${r.large_bags||0}L · ${r.small_bags||0}S)</span></div>
            <div class="row-meta">
              <span>${r.drop_date}</span>
              ${r.overnight?'<span class="overnight-tag">Overnight</span>':''}
              ${r.paid?`<span style="color:var(--green-dk);font-weight:500;">CHF ${r.paid}</span>`:''}
              ${r.reservation_number?`<span class="res-tag">${r.reservation_number}</span>`:''}
            </div>
            ${r.photos&&r.photos.length?`<div class="row-photos">${r.photos.map(src=>`<img src="${src}" onclick="lightbox('${src}')" />`).join('')}</div>`:''}
          </div>
          <button class="checkout-btn" onclick="openCheckout(${r.id})">Check out</button>
        </div>`).join('');
    } catch(e) { el.innerHTML='<div class="empty-state"><p>Could not load records.</p></div>'; }
  }

  async function updateTabCount() {
    try {
      const rows = await sb('luggage_log','GET',null,'?status=eq.in&select=id');
      document.getElementById('tabCount').textContent = rows.length ? `(${rows.length})` : '';
      document.getElementById('activeCount').textContent = rows.length;
    } catch(e) {}
  }

  // ── CHECKOUT ──
  async function openCheckout(id) {
    try {
      const rows = await sb('luggage_log','GET',null,`?id=eq.${id}`);
      const r = rows[0]; if (!r) return;
      checkoutId = id;
      document.getElementById('modalDetail').innerHTML =
        `Receipt <strong>#${r.receipt}</strong> · ${(r.large_bags||0)+(r.small_bags||0)} bags (${r.large_bags||0}L · ${r.small_bags||0}S)<br>In since: ${r.drop_date}${r.overnight?' · Overnight':''}${r.paid?`<br>Paid: CHF ${r.paid}`:''}`;
      document.getElementById('modalPhotos').innerHTML = r.photos&&r.photos.length
        ? r.photos.map(src=>`<img src="${src}" onclick="lightbox('${src}')" title="Tap to verify"/>`).join('')
        : '<span style="font-size:0.78rem;color:var(--light);">No photos on file</span>';
      document.getElementById('checkoutModal').style.display = 'flex';
    } catch(e) { showToast('Error loading record'); }
  }
  function closeModal() { document.getElementById('checkoutModal').style.display='none'; checkoutId=null; }
  async function confirmCheckout() {
    if (!checkoutId) return;
    try {
      await sb('luggage_log','PATCH',{status:'out',checked_out_at:new Date().toISOString()},`?id=eq.${checkoutId}`);
      closeModal(); renderActive(); updateTabCount();
      if (managerUnlocked) renderManager();
      showToast('✓ Checked out','green');
    } catch(e) { showToast('Error — check connection'); }
  }

  // ── MANAGER ──
  function showLock() {
    if (managerUnlocked) { openManager(); return; }
    document.getElementById('lockScreen').style.display='flex';
    document.getElementById('lockInput').value='';
    document.getElementById('lockError').textContent='';
    setTimeout(()=>document.getElementById('lockInput').focus(),80);
  }
  function hideLock() { document.getElementById('lockScreen').style.display='none'; }
  function tryUnlock() {
    if (document.getElementById('lockInput').value===MANAGER_PW) {
      managerUnlocked=true; hideLock(); openManager();
    } else { document.getElementById('lockError').textContent='Incorrect password'; document.getElementById('lockInput').value=''; }
  }
  function openManager() {
    document.getElementById('managerTab').style.display='block';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('managerTab').classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-manager').classList.add('active');
    renderManager();
  }
  async function renderManager() {
    try {
      const all = await sb('luggage_log','GET',null,'?order=id.desc');
      const active = all.filter(r=>r.status==='in');
      const today = new Date().toISOString().slice(0,10);
      const todayRows = all.filter(r=>r.drop_date===today);
      const todayRevenue = todayRows.reduce((s,r)=>s+(r.paid||0),0);
      const totalRevenue = all.reduce((s,r)=>s+(r.paid||0),0);
      const overnight = active.filter(r=>r.overnight).length;
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-label">In storage</div><div class="stat-value">${active.length}</div><div class="stat-sub">${active.reduce((s,r)=>s+(r.large_bags||0)+(r.small_bags||0),0)} bags</div></div>
        <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value">${todayRows.length}</div><div class="stat-sub">${all.filter(r=>r.status==='out'&&r.checked_out_at&&r.checked_out_at.startsWith(today)).length} checked out</div></div>
        <div class="stat-card"><div class="stat-label">Today revenue</div><div class="stat-value" style="color:var(--green-dk)">CHF ${todayRevenue}</div></div>
        <div class="stat-card"><div class="stat-label">Total revenue</div><div class="stat-value" style="color:var(--green-dk)">CHF ${totalRevenue}</div><div class="stat-sub">${all.length} check-ins</div></div>
        <div class="stat-card"><div class="stat-label">Overnight</div><div class="stat-value">${overnight}</div><div class="stat-sub">staying tonight</div></div>
      `;
      document.getElementById('historyBody').innerHTML = all.map(r=>`
        <tr>
          <td><strong>#${r.receipt}</strong></td>
          <td>${r.large_bags||0}L ${r.small_bags||0}S</td>
          <td>${r.drop_date}</td>
          <td>${r.overnight?'<span style="color:var(--amber)">Yes</span>':'No'}</td>
          <td>${r.paid?'CHF '+r.paid:'—'}</td>
          <td>${r.photos&&r.photos.length?`<span style="color:var(--green);font-size:0.75rem;">✓ ${r.photos.length}</span>`:'—'}</td>
          <td><span class="${r.status==='in'?'s-in':'s-out'}">${r.status==='in'?'In':'Out'}</span></td>
          <td>${r.checked_out_at?new Date(r.checked_out_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</td>
        </tr>`).join('');
    } catch(e) { showToast('Could not load manager data'); }
  }

  async function exportCSV() {
    const all = await sb('luggage_log','GET',null,'?order=id.desc');
    const headers = ['Receipt','Large','Small','Date','Overnight','Paid','Photos','Status','Checked out'];
    const rows = all.map(r=>[r.receipt,r.large_bags||0,r.small_bags||0,r.drop_date,r.overnight?'Yes':'No',r.paid||0,r.photos?r.photos.length:0,r.status,r.checked_out_at||'']);
    const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`dulac-luggage-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  // ── TABS ──
  function switchTab(tab, el) {
    if (tab==='manager'&&!managerUnlocked){showLock();return;}
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+tab).classList.add('active');
    if(tab==='active')renderActive();
    if(tab==='reservations')renderReservations();
    if(tab==='manager')renderManager();
  }

  function lightbox(src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').style.display='flex'; }

  function showToast(msg,type='') {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast'+(type?' '+type:''); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  init();
  updateTabCount();
</script>
</body>
</html>
